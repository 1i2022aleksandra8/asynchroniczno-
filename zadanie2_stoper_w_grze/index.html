<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontrolka Interwałowa Tiktock</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 2rem; background-color: #fce7f3; color: #1f2937; }
        .container { max-width: 900px; margin: auto; background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border-top: 4px solid #db2777; }
        h1 { border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; color: #be185d; font-size: 1.8rem; }
        button { display: inline-block; background-color: #db2777; color: white; border: none; padding: 0.75rem 1.5rem; margin-top: 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s ease; }
        button:hover { background-color: #be185d; }
        .wynik { margin-top: 1.5rem; padding: 1.5rem; background-color: #fdf2f8; border-left: 5px solid #db2777; font-family: 'Courier New', Courier, monospace; font-size: 1.1em; white-space: pre-wrap; min-height: 50px; }
        .stoper-box { font-size: 2em; text-align: center; margin: 20px 0; font-weight: bold; color: #9d174d; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kontrolka Interwałowa Tiktock</h1>

        <button id="startBtn">START</button>
        <button id="stopBtn">STOP</button>

        <div class="wynik" id="wynikUI">Czas: 0</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
